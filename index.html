<!DOCTYPE html>
<html lang="hi" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhati Pro Tools - All in One</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#27ae60">

</head>
<body>
    <div class="auth-header">
        <div class="logo">BhatiTools</div>
        <div class="app-themes">
            <span class="theme-dot" style="background:#27ae60" onclick="setTheme('default')"></span>
            <span class="theme-dot" style="background:#6a3f2b" onclick="setTheme('light-brown')"></span>
            <span class="theme-dot" style="background:#880e4f" onclick="setTheme('light-pink')"></span>
        </div>
        <div class="login-btns" id="authSection">
            <button class="google-btn" onclick="googleLogin()">Google Login</button>
        </div>
    </div>

    <nav class="nav-tabs">
        <button onclick="openScreen('notepad', this)" class="active">📝 Notes</button>
        <button onclick="openScreen('checklist', this)">✅ Checklist</button>
        <button onclick="openScreen('calendar', this)">📅 Calendar</button>
        <button onclick="openScreen('backup', this)">☁️ Backup</button>
    </nav>

    <div id="notepad" class="screen active-screen">
        <div class="view-controls">
            <button onclick="changeView('grid')">Grid</button>
            <button onclick="changeView('list')">List</button>
            <button onclick="changeView('large')">Large</button>
        </div>
        
        <div class="card editor-card">
            <h2>Naya Note Likhein</h2>
            <div class="theme-dots">
                <span>Note Color:</span>
                <div class="dot" style="background: #fff;" onclick="setNoteColor('#fff')"></div>
                <div class="dot" style="background: #fff9c4;" onclick="setNoteColor('#fff9c4')"></div>
                <div class="dot" style="background: #e1f5fe;" onclick="setNoteColor('#e1f5fe')"></div>
                <div class="dot" style="background: #f1f8e9;" onclick="setNoteColor('#f1f8e9')"></div>
            </div>
            <input type="text" id="noteTitle" placeholder="Heading (Title)...">
            <textarea id="noteText" placeholder="Write your thoughts here..."></textarea>
            <button class="btn" onclick="saveNote()">Save Encrypted Note 🔐</button>
        </div>
        <div id="notesHistory" class="grid-view"></div>
    </div>

    <div id="checklist" class="screen">
        <div class="card">
            <h2>My Tasks</h2>
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="Naya kaam add karein...">
                <button class="btn" style="width: 80px;" onclick="addTodo()">Add</button>
            </div>
            <div id="todoList"></div>
        </div>
    </div>

    <div id="calendar" class="screen">
        <div class="card">
            <div class="cal-header">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <h2 id="monthDisplay">Month</h2>
                <button class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
            <div id="yearDisplay" style="text-align: center; font-weight: bold; color: var(--primary); margin-bottom: 10px;"></div>
            <div class="cal-grid" id="calGrid">
                <div class="cal-day-name">SUN</div><div class="cal-day-name">MON</div>
                <div class="cal-day-name">TUE</div><div class="cal-day-name">WED</div>
                <div class="cal-day-name">THU</div><div class="cal-day-name">FRI</div>
                <div class="cal-day-name">SAT</div>
            </div>
        </div>
        <p style="text-align:center; font-size:12px; color:#777;">*Date par click karke Event add karein*</p>
    </div>

    <div id="backup" class="screen">
        <div class="card">
            <h2>Backup & Sync Settings</h2>
            <p>Aapka data 256-bit encryption ke saath cloud par sync hota hai. [3]</p>
            <div class="backup-options">
                <button class="btn" style="background:#27ae60; margin-bottom:10px;" onclick="location.reload()">Manual Sync Now ☁️</button>
                <button class="btn" style="background:#2980b9; margin-bottom:10px;" onclick="downloadBackup()">Download JSON Backup 💾</button>
                <button class="btn" style="background:#f39c12;" onclick="alert('Restore feature logic script mein add karna hoga!')">Restore from File 🔄</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
